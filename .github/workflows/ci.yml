name: CI

on:
  push:
    paths-ignore:
      - "README.md"
  pull_request:
    paths-ignore:
      - "README.md"

jobs:
  test:
    name: 테스트 실행
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test

  deploy:
    name: EC2 배포
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: DIST_VER 버전 업
        run: |
          node -e "
            const fs = require('fs');
            const v = JSON.parse(fs.readFileSync('version.json', 'utf8'));
            const parts = v.DIST_VER.split('.');
            parts[3] = String(Number(parts[3]) + 1);
            v.DIST_VER = parts.join('.');
            fs.writeFileSync('version.json', JSON.stringify(v, null, '\t') + '\n');
            console.log('DIST_VER:', v.DIST_VER);
          "

      - name: 버전 커밋 & 푸시
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add version.json
          git commit -m "chore: bump DIST_VER [skip ci]"
          git push

      - name: SSH로 EC2 접속 후 배포
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            cd ${{ secrets.EC2_APP_DIR }}
            sudo git pull origin main
            sudo pnpm install --frozen-lockfile
            sudo pnpm run build
            pnpm start
            pnpm reload

